[user_parameters]
debug = true
use_uv = true

excluded = [".venv", "__init__", "__pycache__"]
excluded_functions = ["wrapper"]

common_symbol = "●"
bad_symbol = "✗"
warning_symbol = "⚠"
good_symbol = "✔"
special_symbol = "★"
epic_symbol = "♥"
skipped_symbol ="…"
    
common_color = "white"
bad_color = "red"
warning_color = "dark_orange"
good_color = "green"
special_color = "yellow"
epic_color = "purple"
