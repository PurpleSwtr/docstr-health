[requires_v1]
special = ["Keyword arguments", "Args", "Parameters", "Attributes", "Keyword arguments:", "Args:", "Parameters:", "Attributes:", ":param", ":type"]
epic = ["Returns", "Raises", "Returns:", "Raises:", ":returns", ":rtype", ":raises"]

[requires_v2]
special = ["Keyword arguments:", "Args:", "Parameters:", "Attributes:", "Keyword arguments", "Args", "Parameters", "Attributes", ":param", ":type"]
epic = ["Returns:", "Raises:", "Usage:", "Examples:", "Returns", "Raises", "Usage", "Examples", ":returns", ":rtype", ":raises"]

[requires_v3]
special = ["Keyword arguments:", "Args:", "Parameters:", "Attributes:", "Keyword arguments", "Args", "Parameters", "Attributes", ":param", ":type"]
epic = ["Returns:", "Yields:", "Raises:", "Usage:", "Examples:", "Returns", "Yields", "Raises", "Usage", "Examples", ":returns", ":rtype", ":raises"]